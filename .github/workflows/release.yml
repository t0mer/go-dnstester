name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave blank to auto-compute YYYY.M.PATCH)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so next-version.sh can see all tags

      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(bash scripts/next-version.sh)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Go modules
        run: go mod download

      - name: Build all targets
        run: BUILD_MODE=prod VERSION=${{ steps.ver.outputs.version }} bash scripts/build.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/*
